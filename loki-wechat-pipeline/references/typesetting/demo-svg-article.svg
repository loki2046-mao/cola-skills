<svg width="800" height="2440" viewBox="0 0 800 2440" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="paperGlow" x1="90" y1="0" x2="710" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFDF9"/>
      <stop offset="1" stop-color="#FCF7EF"/>
    </linearGradient>
    <linearGradient id="photoWash" x1="130" y1="0" x2="670" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8EBCF"/>
      <stop offset="1" stop-color="#FBF4E8"/>
    </linearGradient>
    <style>
      .bg { fill: #FFFFFF; }
      .paper { fill: #FFFDF9; }
      .sand { fill: #F8ECD7; }
      .line { stroke: #E7D7BE; }
      .accent { fill: #D68A2E; }
      .ink { fill: #2E241E; }
      .subink { fill: #5E5046; }
      .muted { fill: #7C6B5E; }
      .blue { fill: #4C657C; }
      .title {
        fill: #2E241E;
        font-family: "Source Han Serif SC","Noto Serif SC","Songti SC","STSong",serif;
        font-weight: 700;
      }
      .body {
        fill: #4F433A;
        font-family: "Source Han Serif SC","Noto Serif SC","Songti SC","STSong",serif;
        font-weight: 400;
      }
      .meta {
        fill: #7C6B5E;
        font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
        font-weight: 500;
      }
      .label {
        fill: #A86418;
        font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
        font-weight: 600;
        letter-spacing: 1.2px;
      }
    </style>
  </defs>

  <rect class="bg" width="800" height="2440"/>

  <rect x="86" y="74" width="128" height="34" rx="17" class="sand"/>
  <text x="150" y="96" text-anchor="middle" class="label" font-size="13">MAGAZINE NOTE</text>

  <text x="86" y="170" class="title" font-size="54">
    <tspan x="86" dy="0">满屏都在聊 Skill，</tspan>
    <tspan x="86" dy="72">但普通人真的需要吗？</tspan>
  </text>

  <text x="86" y="338" class="meta" font-size="18">把热词放回真实使用场景里，重新讨论一次它的意义。</text>
  <rect x="86" y="378" width="86" height="3" rx="1.5" class="accent"/>

  <rect x="86" y="428" width="628" height="360" rx="28" fill="url(#paperGlow)" stroke="#E7D7BE" stroke-width="1.4"/>
  <rect x="92" y="434" width="628" height="360" rx="28" fill="none" stroke="#F1E5D2" stroke-width="1"/>
  <rect x="116" y="462" width="568" height="292" rx="20" fill="#FFFDF9"/>
  <rect x="124" y="470" width="552" height="276" rx="18" fill="url(#photoWash)" stroke="#ECDCC5" stroke-width="1"/>

  <text x="154" y="534" class="label" font-size="14">ARTICLE COVER / 单图模式</text>
  <text x="154" y="592" class="title" font-size="30">统一圆角、统一包边、统一相纸感</text>
  <text x="154" y="636" class="body" font-size="22">边框做得更近、更薄，看起来更像阴影和压边，</text>
  <text x="154" y="672" class="body" font-size="22">而不是一个框再套一个框。</text>

  <rect x="86" y="848" width="112" height="32" rx="16" fill="#FFFDF9" stroke="#E7D7BE" stroke-width="1.1"/>
  <text x="142" y="869" text-anchor="middle" class="label" font-size="12">OPENING</text>

  <text x="86" y="952" class="body" font-size="29">
    <tspan x="86" dy="0">嘿嘿嘿，大家好，我是被工作按头、好久没更新的小熊猫！</tspan>
    <tspan x="86" dy="56">最近打开 X、刷公众号、逛小红书，满屏都是 Skill，</tspan>
    <tspan x="86" dy="56">我当然也不可免俗地上手了一下。</tspan>
  </text>

  <text x="86" y="1142" class="body" font-size="29">
    <tspan x="86" dy="0">有人说太香了，工作效率翻倍；</tspan>
    <tspan x="86" dy="56">有人说根本不会用，摸不着门道；</tspan>
    <tspan x="86" dy="56">还有人说太多了根本用不过来，选择困难症犯了。</tspan>
  </text>

  <rect x="86" y="1278" width="628" height="154" rx="24" class="paper" stroke="#E7D7BE" stroke-width="1.3"/>
  <rect x="100" y="1292" width="6" height="126" rx="3" class="accent"/>
  <text x="126" y="1350" class="title" font-size="30">问题可能不在 Skill 本身，</text>
  <text x="126" y="1392" class="title" font-size="30">而在我们对它的期待和理解。</text>

  <rect x="86" y="1502" width="142" height="32" rx="16" fill="#F8ECD7"/>
  <text x="157" y="1523" text-anchor="middle" class="label" font-size="12">GALLERY MODE</text>
  <text x="86" y="1610" class="title" font-size="38">双图及以上，就做成画廊式浏览</text>
  <text x="86" y="1654" class="meta" font-size="20">不是往下堆图，而是让它像同一个内容组，被统一编辑过。</text>

  <rect x="86" y="1702" width="628" height="548" rx="28" fill="#FFF9F0" stroke="#E7D7BE" stroke-width="1.4"/>
  <rect x="92" y="1708" width="628" height="548" rx="28" fill="none" stroke="#F1E4D0" stroke-width="1"/>

  <text x="124" y="1764" class="label" font-size="13">PHOTO ESSAY / 01</text>
  <text x="124" y="1812" class="title" font-size="28">滑动组图的视觉方向</text>

  <rect x="124" y="1844" width="552" height="286" rx="18" fill="#FFFDF9"/>
  <rect x="130" y="1850" width="552" height="286" rx="18" fill="none" stroke="#E8D9C3" stroke-width="1"/>
  <rect x="142" y="1862" width="528" height="262" rx="14" fill="#F6E8C8"/>

  <text x="408" y="2008" text-anchor="middle" class="title" font-size="42">Gallery 01</text>
  <text x="408" y="2052" text-anchor="middle" class="body" font-size="21">同一组图片沿用同样的圆角、边框和图注规则</text>

  <text x="124" y="2194" class="meta" font-size="17">01 / 03  这里会替换成真实图片与简短图注</text>
  <circle cx="382" cy="2198" r="7" class="accent"/>
  <circle cx="408" cy="2198" r="7" fill="#E7D7BE"/>
  <circle cx="434" cy="2198" r="7" fill="#E7D7BE"/>

  <rect x="86" y="2322" width="628" height="1.5" fill="#E7D7BE"/>
  <text x="86" y="2380" class="title" font-size="30">这一版的关键词：暖、克制、编辑感、像杂志内页。</text>
</svg>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: {{bg}}; --text: {{text}}; --mid: {{mid}}; --dim: {{dim}};
    --accent: {{accent}};
    --font-serif: 'Noto Serif SC', serif;
    --font-sans: 'PingFang SC', 'Noto Sans SC', system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; }
  .page { width: 1080px; height: 1440px; margin-bottom: 40px; page-break-after: always; }
  .card { width: 1080px; height: 1440px; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 140px 100px; text-align: center; }
  .mega { font: 700 52px/1.25 var(--font-serif); color: var(--text); letter-spacing: -0.02em; margin-bottom: 30px; }
  .mega-a { font: 700 44px/1.25 var(--font-serif); color: var(--accent); letter-spacing: -0.02em; margin-bottom: 60px; }
  .sub { font: 400 30px/1.8 var(--font-sans); color: var(--mid); }
  .sub-dim { font: 400 32px/1.8 var(--font-sans); color: var(--dim); margin-top: 8px; }
  .bye { font: 400 24px/1.8 var(--font-sans); color: var(--dim); margin-top: 60px; }
</style>

<div class="page">
  <div class="card">
    <div class="mega">{{line_1}}</div>
    {{#line_2}}<div class="mega">{{line_2}}</div>{{/line_2}}
    {{#sub_lines}}
    <div class="sub">{{.}}</div>
    {{/sub_lines}}
    {{#sub_dim}}<div class="sub-dim">{{sub_dim}}</div>{{/sub_dim}}
    <div class="mega-a">{{cta_line}}</div>
    {{#bye_lines}}
    <div class="bye">{{{.}}}</div>
    {{/bye_lines}}
  </div>
</div>
